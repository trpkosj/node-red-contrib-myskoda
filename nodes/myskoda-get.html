<script type="text/javascript">
    RED.nodes.registerType('myskoda-get',{
        category: 'car',
        color: '#4aa82e',
        defaults: {
            name: {value:""},
            credentials: {value:"", type:"myskoda-credentials"},
            queryParking:{
                value: false,
                required: false
            },
            queryClimater:{
                value: false,
                required: false
            },
            queryCharger:{
                value: false,
                required: false
            },
            queryMaintenance:{
                value: false,
                required: false
            },
        },
        inputs:1,
        outputs:1,
        icon: "arrow-in.svg",
        label: function() {
            return this.name||"myskoda-get";
        }
    });
</script>

<script type="text/x-red" data-template-name="myskoda-get">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-credentials"><i class="fa fa-user"></i> Account</label>
        <input type="text" id="node-input-credentials">
    </div>

    <div class="form-row">
        <label for="node-input-queryParking"><i class="fa fa-map-marker"></i> Query parking position</label>
        <input type="checkbox" id="node-input-queryParking">
    </div>
    <div class="form-row">
        <label for="node-input-queryClimater"><i class="fa fa-snowflake-o"></i> Query air conditioning</label>
        <input type="checkbox" id="node-input-queryClimater">
    </div>
    <div class="form-row">
        <label for="node-input-queryCharger"><i class="fa fa-bolt"></i> Query charging information</label>
        <input type="checkbox" id="node-input-queryCharger">
    </div>
    <div class="form-row">
        <label for="node-input-queryMaintenance"><i class="fa fa-wrench"></i> Query maintenance information</label>
        <input type="checkbox" id="node-input-queryMaintenance">
    </div>
</script>

<script type="text/x-red" data-help-name="myskoda-get">
    <p>A node to log in to MySkoda service and get vehicle data</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt class="optional">Name<span class="property-type">string</span></dt>
        <dd>name of node</dd>

        <dt class="required">Account<span class="property-type">myskoda-credentials</span></dt>
        <dd>MySkoda account credentials (shared config node)</dd>

        <dt class="optional">Query parking position<span class="property-type">boolean</span></dt>
        <dd>include last known parking position</dd>

        <dt class="optional">Query air conditioning<span class="property-type">boolean</span></dt>
        <dd>include air conditioning status</dd>

        <dt class="optional">Query charging information<span class="property-type">boolean</span></dt>
        <dd>include charging status (EV/PHEV only)</dd>

        <dt class="optional">Query maintenance information<span class="property-type">boolean</span></dt>
        <dd>include maintenance report</dd>
    </dl>
    <h3>Inputs</h3>
    <p>Any input triggers the API call</p>

    <h3>Output</h3>
    <p>JSON object with vehicle info, status, driving range, and optional data for all cars in your MySkoda account</p>

    <h3>References</h3>
        <ul>
            <li><a href="https://www.myskoda.com/">MySkoda</a></li>
            <li><a href="https://github.com/trpkosj/node-red-contrib-myskoda">GitHub</a> - the nodes github repository</li>
        </ul>
</script>
