<script type="text/javascript">
    RED.nodes.registerType('myskoda-credentials',{
        category: 'config',
        defaults: {
            name: {value:"MySkoda Account"},
        },
        credentials: {
            email: { type: "text" },
            password: { type: "password" }
        },
        label: function() {
            return this.name || (this.credentials && this.credentials.email) || "MySkoda Account";
        }
    });
</script>

<script type="text/x-red" data-template-name="myskoda-credentials">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="MySkoda Account">
    </div>
    <div class="form-row">
        <label for="node-input-email"><i class="fa fa-envelope"></i> Email</label>
        <input type="text" id="node-input-email" placeholder="your@email.com">
    </div>
    <div class="form-row">
        <label for="node-input-password"><i class="fa fa-lock"></i> Password</label>
        <input type="password" id="node-input-password">
    </div>
</script>
